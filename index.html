<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الملكية | استعراض آمن</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        /* الألوان الملكية: أسود، ذهبي، رمادي داكن، أبيض كريمي */
        :root {
            --bg-dark: #1a1a1a;
            --bg-deep: #101010;
            --royal-gold: #e8a03f;
            --royal-gold-dim: rgba(232, 160, 63, 0.15);
            --cream-white: #f2f2f2;
            --panel-bg: rgba(26, 26, 26, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-deep) 100%);
            color: var(--cream-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--royal-gold-dim);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--cream-white);
            letter-spacing: 0.5px;
        }

        .brand-title span {
            color: var(--royal-gold);
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        .canvas-wrapper {
            position: relative;
            background: #0a0a0a;
            border: 1px solid var(--royal-gold-dim);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            transition: filter 0.1s, opacity 0.1s;
        }

        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .toolbar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--royal-gold-dim);
            padding: 12px 25px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .btn-nav {
            background: transparent;
            border: 1px solid transparent;
            color: var(--cream-white);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-nav:hover:not(:disabled) {
            background: var(--royal-gold-dim);
            border-color: var(--royal-gold);
            color: var(--royal-gold);
        }

        .btn-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* حظر الطباعة كلياً */
        @media print {
            body { display: none !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-title">المكتبة <span>الملكية</span></div>
        <div style="font-size: 0.85rem; color: var(--royal-gold);">نظام التشفير والحماية النشط (DRM)</div>
    </header>

    <main>
        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="pdf-canvas"></canvas>
        </div>
    </main>

    <div class="toolbar">
        <button class="btn-nav" id="prev-btn" disabled>السابق</button>
        <div style="font-weight: 600;"><span id="page-num">0</span> / <span id="page-count">0</span></div>
        <button class="btn-nav" id="next-btn" disabled>التالي</button>
    </div>

    <script>
        /* ==========================================
           1. هندسة فك التشفير الصامت
           يتم تجميع كلمة المرور برمجياً لمنع سرقتها
        ========================================== */
        const _0xDoc = 'mohasabeh - Royal Library.pdf';
        
        // كلمة المرور ba.yann-26#roy مقسمة ومشفرة بصيغة Base64
        const _p1 = window.atob('YmEueWFubg=='); // ba.yann
        const _p2 = window.atob('LTI2I3JveQ=='); // -26#roy
        const _0xKey = _p1 + _p2; 

        let pdfDoc = null, pageNum = 1, pageRendering = false, pageNumPending = null,
            canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d'),
            wrapper = document.getElementById('canvasWrapper');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        /* ==========================================
           2. معالجة ورسم المستند
        ========================================== */
        function renderPage(num) {
            pageRendering = true;
            pdfDoc.getPage(num).then(function(page) {
                const viewport = page.getViewport({scale: 1.5});
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderTask = page.render({canvasContext: ctx, viewport: viewport});
                renderTask.promise.then(function() {
                    pageRendering = false;
                    applyWatermark();
                    if (pageNumPending !== null) { renderPage(pageNumPending); pageNumPending = null; }
                });
            });
            document.getElementById('page-num').textContent = num;
        }

        // بصمة الهوية البصرية فوق المستند (تمنع الاستفادة من لقطات الشاشة)
        function applyWatermark() {
            ctx.save();
            ctx.font = "bold 24px Cairo";
            ctx.fillStyle = "rgba(232, 160, 63, 0.12)"; // ذهبي شفاف جداً
            ctx.textAlign = "center";
            for (let x = 100; x < canvas.width; x += 350) {
                for (let y = 100; y < canvas.height; y += 250) {
                    ctx.save(); ctx.translate(x, y); ctx.rotate(-Math.PI / 5);
                    ctx.fillText("المكتبة الملكية - Royal Library", 0, 0); 
                    ctx.font = "16px Cairo";
                    ctx.fillText("نسخة مشفرة للعرض فقط", 0, 30);
                    ctx.restore();
                }
            }
            ctx.restore();
        }

        function queueRenderPage(num) { if (pageRendering) { pageNumPending = num; } else { renderPage(num); } }
        document.getElementById('prev-btn').addEventListener('click', () => { if (pageNum <= 1) return; pageNum--; queueRenderPage(pageNum); });
        document.getElementById('next-btn').addEventListener('click', () => { if (pageNum >= pdfDoc.numPages) return; pageNum++; queueRenderPage(pageNum); });

        // التحميل الصامت للملف وتمرير مفتاح التشفير
        pdfjsLib.getDocument({ url: _0xDoc, password: _0xKey }).promise.then(function(pdfDoc_) {
            pdfDoc = pdfDoc_;
            document.getElementById('page-count').textContent = pdfDoc.numPages;
            document.getElementById('prev-btn').disabled = false;
            document.getElementById('next-btn').disabled = false;
            renderPage(pageNum);
        }).catch(err => {
            console.error("Access Denied.");
            wrapper.innerHTML = "<h3 style='color:red; text-align:center; padding:50px;'>عذراً، المستند مشفر أو غير موجود.</h3>";
        });

        /* ==========================================
           3. ترسانة الحماية والأمن السيبراني
        ========================================== */
        
        // أ. حظر النقر الأيمن
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // ب. تعمية الشاشة عند تشغيل أداة القص أو التبديل بين التطبيقات
        window.addEventListener('blur', () => { wrapper.style.filter = 'blur(60px)'; wrapper.style.opacity = '0'; });
        window.addEventListener('focus', () => { wrapper.style.filter = 'none'; wrapper.style.opacity = '1'; });
        
        // ج. حظر اختصارات لوحة المفاتيح (الطباعة، الحفظ، فحص العنصر)
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 's' || e.key === 'u' || e.key === 'i')) {
                e.preventDefault();
            }
            if (e.key === 'PrintScreen') navigator.clipboard.writeText('');
        });

        // د. فخ أدوات المطورين (تجميد المتصفح إذا حاول أحدهم فتح الكود)
        setInterval(function() {
            const before = new Date().getTime();
            debugger; 
            const after = new Date().getTime();
            if (after - before > 100) {
                document.body.innerHTML = ""; // تدمير الصفحة إذا تم اكتشاف فحص
            }
        }, 1000);

    </script>
</body>
</html>
