<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --royal-purple: #563777; --royal-gold: #e8a03f; --dark-bg: #1a1a1a; --deep-bg: #101010; --text-light: #f2f2f2; --glass-panel: rgba(26, 26, 26, 0.85); --glass-border: rgba(232, 160, 63, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        body { background: linear-gradient(135deg, var(--deep-bg) 0%, var(--dark-bg) 100%); color: var(--text-light); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { background: var(--glass-panel); backdrop-filter: blur(12px); border-bottom: 2px solid var(--royal-purple); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .brand img { width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--royal-gold); object-fit: cover; }
        .brand-text h1 { font-size: 1.1rem; font-weight: 800; }
        .brand-text h1 span { color: var(--royal-gold); }
        .user-badge { font-size: 0.75rem; color: var(--royal-purple); }
        .screen { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .screen.active { display: block; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: rgba(86, 55, 119, 0.1); border: 1px solid var(--glass-border); border-radius: 16px; padding: 25px 15px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--royal-gold); }
        .btn-action { background: var(--royal-purple); color: var(--text-light); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-bottom: 20px; }
        #viewer-container { position: relative; width: 100%; height: calc(100vh - 160px); background: #050505; border-radius: 12px; border: 1px solid var(--glass-border); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        .watermark { position: absolute; pointer-events: none; opacity: 0.15; z-index: 10; width: 100%; height: 100%; }
        .toolbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--glass-panel); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 40px; padding: 12px 25px; display: flex; align-items: center; gap: 25px; z-index: 50; }
        .btn-nav { background: none; border: none; color: var(--text-light); font-weight: 700; cursor: pointer; }
        @media print { body { display: none !important; } }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <img src="logo.svg" alt="Logo">
            <div class="brand-text">
                <h1>Royal <span>Library</span></h1>
                <div class="user-badge" id="user-info"></div>
            </div>
        </div>
    </header>

    <main id="screen-home" class="screen active">
        <div class="grid-container">
            <div class="card" onclick="openYear('year1')"><h2>Year 1</h2></div>
            <div class="card" onclick="openYear('year2')"><h2>Year 2</h2></div>
            <div class="card" onclick="openYear('year3')"><h2>Year 3</h2></div>
            <div class="card" onclick="openYear('year4')"><h2>Year 4</h2></div>
        </div>
    </main>

    <main id="screen-list" class="screen">
        <button class="btn-action" onclick="goHome()">Back</button>
        <div id="files-grid" class="grid-container"></div>
    </main>

    <main id="screen-viewer" class="screen">
        <button class="btn-action" onclick="closeViewer()">Close</button>
        <div id="viewer-container">
            <canvas id="main-canvas"></canvas>
            <div class="watermark" id="watermark-layer"></div>
        </div>
    </main>

    <div class="toolbar" id="pdf-toolbar" style="display: none;">
        <button class="btn-nav" id="prev-btn">Prev</button>
        <div style="font-weight: 800; color: var(--royal-gold);"><span id="page-num">0</span> / <span id="page-count">0</span></div>
        <button class="btn-nav" id="next-btn">Next</button>
    </div>

    <script>
        let tgUser = { id: 'GUEST', name: 'User' };
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            const initData = window.Telegram.WebApp.initDataUnsafe;
            if (initData && initData.user) {
                tgUser.id = initData.user.id;
                tgUser.name = initData.user.username || initData.user.first_name;
            }
        }
        document.getElementById('user-info').innerText = tgUser.name;

        const database = {
            year1: { files: [{ title: "Accounting", url: "mohasabeh - Royal Library.pdf", pwdCodes: [98, 97, 46, 121, 97, 110, 110, 45, 50, 54, 35, 114, 111, 121] }] },
            year2: { files: [] }, year3: { files: [] }, year4: { files: [] }
        };

        function hideAll() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('pdf-toolbar').style.display = 'none'; }
        function goHome() { hideAll(); document.getElementById('screen-home').classList.add('active'); }
        function openYear(y) {
            document.getElementById('files-grid').innerHTML = database[y].files.map(f => `<div class="card" onclick="initViewer('${f.url}', [${f.pwdCodes}])"><h3>${f.title}</h3></div>`).join('');
            hideAll(); document.getElementById('screen-list').classList.add('active');
        }
        function closeViewer() { hideAll(); document.getElementById('screen-list').classList.add('active'); }

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let pdfDoc = null, pageNum = 1;

        function initViewer(url, pwdCodes) {
            hideAll();
            document.getElementById('screen-viewer').classList.add('active');
            const pwd = String.fromCharCode(...pwdCodes);
            pdfjsLib.getDocument({ url: url, password: pwd, cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/cmaps/', cMapPacked: true }).promise.then(doc => {
                pdfDoc = doc; document.getElementById('page-count').innerText = doc.numPages;
                document.getElementById('pdf-toolbar').style.display = 'flex';
                renderPage(1);
            });
        }

        function renderPage(num) {
            pdfDoc.getPage(num).then(page => {
                const canvas = document.getElementById('main-canvas');
                const ctx = canvas.getContext('2d');
                const viewport = page.getViewport({ scale: 2.0 });
                canvas.height = viewport.height; canvas.width = viewport.width;
                page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                    const idText = `ID: ${tgUser.id} | ${tgUser.name}`;
                    ctx.save(); ctx.font = "bold 30px Cairo"; ctx.fillStyle = "rgba(232, 160, 63, 0.15)";
                    for(let x=0; x<canvas.width; x+=300) for(let y=0; y<canvas.height; y+=200) { ctx.fillText(idText, x, y); }
                    ctx.restore();
                });
            });
            document.getElementById('page-num').innerText = num;
        }

        document.getElementById('prev-btn').onclick = () => { if (pageNum > 1) renderPage(--pageNum); };
        document.getElementById('next-btn').onclick = () => { if (pageNum < pdfDoc.numPages) renderPage(++pageNum); };

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 's' || e.key === 'i')) e.preventDefault(); });
        window.addEventListener('blur', () => { document.getElementById('viewer-container').style.filter = 'blur(60px)'; });
        window.addEventListener('focus', () => { document.getElementById('viewer-container').style.filter = 'none'; });
        setInterval(() => { debugger; }, 1000);
    </script>
</body>
</html>
