<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Library</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root {
            --bg-dark: #1a1a1a;
            --bg-deep: #101010;
            --royal-gold: #e8a03f;
            --royal-gold-dim: rgba(232, 160, 63, 0.15);
            --cream-white: #f2f2f2;
            --panel-bg: rgba(26, 26, 26, 0.95);
            --tg-height: var(--tg-viewport-height, 100vh);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background: var(--bg-deep);
            color: var(--cream-white);
            height: var(--tg-height);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            overscroll-behavior: none;
        }

        header {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--royal-gold-dim);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            flex-shrink: 0;
        }

        .brand-title {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .brand-title span {
            color: var(--royal-gold);
        }

        #scroll-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 20px 10px 80px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: filter 0.2s, opacity 0.2s;
        }

        .page-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            background: #0a0a0a;
            border: 1px solid var(--royal-gold-dim);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .page-wrapper canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .toolbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--royal-gold-dim);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 20;
        }

        .btn-nav {
            background: transparent;
            border: 1px solid transparent;
            color: var(--cream-white);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .btn-nav:hover {
            background: var(--royal-gold-dim);
            color: var(--royal-gold);
        }

        #thumbnails-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--tg-height);
            background: var(--bg-deep);
            z-index: 30;
            display: none;
            flex-direction: column;
        }

        .modal-header {
            padding: 15px 20px;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--royal-gold-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--royal-gold);
            font-size: 1.5rem;
            cursor: pointer;
        }

        #thumbnails-grid {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            align-content: flex-start;
        }

        .thumb-wrapper {
            border: 1px solid var(--royal-gold-dim);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .thumb-wrapper canvas {
            width: 100%;
            display: block;
        }

        .thumb-label {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.7);
            text-align: center;
            font-size: 0.8rem;
            padding: 4px 0;
        }

        @media print { body { display: none !important; } }
    </style>
</head>
<body>

    <header>
        <div class="brand-title">Royal <span>Library</span></div>
    </header>

    <div id="scroll-container"></div>

    <div class="toolbar">
        <button class="btn-nav" id="grid-btn">تصفح الصفحات</button>
    </div>

    <div id="thumbnails-modal">
        <div class="modal-header">
            <div class="brand-title">المصغرات</div>
            <button class="close-btn" id="close-modal">&times;</button>
        </div>
        <div id="thumbnails-grid"></div>
    </div>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        const _0xDoc = 'mohasabeh - Royal Library.pdf';
        const _p1 = window.atob('YmEueWFubg==');
        const _p2 = window.atob('LTI2I3JveQ==');
        const _0xKey = _p1 + _p2; 

        let pdfDoc = null;
        const scrollContainer = document.getElementById('scroll-container');
        const thumbGrid = document.getElementById('thumbnails-grid');
        const modal = document.getElementById('thumbnails-modal');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const renderObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const canvas = entry.target.querySelector('canvas');
                    if (canvas && !canvas.rendered) {
                        renderCanvas(canvas, parseInt(canvas.dataset.page), 1.5, true);
                        canvas.rendered = true;
                    }
                }
            });
        }, { rootMargin: '500px' });

        const thumbObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const canvas = entry.target.querySelector('canvas');
                    if (canvas && !canvas.rendered) {
                        renderCanvas(canvas, parseInt(canvas.dataset.page), 0.3, false);
                        canvas.rendered = true;
                    }
                }
            });
        }, { rootMargin: '300px' });

        function applyWatermark(ctx, width, height) {
            ctx.save();
            ctx.font = "bold 24px Cairo";
            ctx.fillStyle = "rgba(232, 160, 63, 0.12)";
            ctx.textAlign = "center";
            for (let x = 100; x < width; x += 350) {
                for (let y = 100; y < height; y += 250) {
                    ctx.save(); 
                    ctx.translate(x, y); 
                    ctx.rotate(-Math.PI / 5);
                    ctx.fillText("Royal Library", 0, 0); 
                    ctx.restore();
                }
            }
            ctx.restore();
        }

        function renderCanvas(canvas, pageNum, scale, withWatermark) {
            pdfDoc.getPage(pageNum).then(page => {
                const viewport = page.getViewport({ scale: scale });
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                const ctx = canvas.getContext('2d');

                page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
                    if (withWatermark) applyWatermark(ctx, canvas.width, canvas.height);
                });
            });
        }

        function initPages(numPages) {
            for (let i = 1; i <= numPages; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'page-wrapper';
                wrapper.id = `page-wrap-${i}`;
                
                const canvas = document.createElement('canvas');
                canvas.dataset.page = i;
                wrapper.appendChild(canvas);
                
                scrollContainer.appendChild(wrapper);
                renderObserver.observe(wrapper);

                const thumbWrap = document.createElement('div');
                thumbWrap.className = 'thumb-wrapper';
                thumbWrap.onclick = () => {
                    modal.style.display = 'none';
                    wrapper.scrollIntoView({ behavior: 'smooth' });
                };

                const thumbCanvas = document.createElement('canvas');
                thumbCanvas.dataset.page = i;
                
                const label = document.createElement('div');
                label.className = 'thumb-label';
                label.innerText = i;

                thumbWrap.appendChild(thumbCanvas);
                thumbWrap.appendChild(label);
                thumbGrid.appendChild(thumbWrap);
                thumbObserver.observe(thumbWrap);
            }
        }

        pdfjsLib.getDocument({
            url: _0xDoc,
            password: _0xKey,
            cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/cmaps/',
            cMapPacked: true
        }).promise.then(function(pdfDoc_) {
            pdfDoc = pdfDoc_;
            initPages(pdfDoc.numPages);
        }).catch(err => {
            scrollContainer.innerHTML = "<h3 style='color:red; margin-top:50px;'>عذراً، المستند غير متوفر.</h3>";
        });

        document.getElementById('grid-btn').addEventListener('click', () => {
            modal.style.display = 'flex';
        });

        document.getElementById('close-modal').addEventListener('click', () => {
            modal.style.display = 'none';
        });

        document.addEventListener('contextmenu', e => e.preventDefault());
        
        window.addEventListener('blur', () => { 
            scrollContainer.style.filter = 'blur(60px)'; 
            scrollContainer.style.opacity = '0'; 
        });
        
        window.addEventListener('focus', () => { 
            scrollContainer.style.filter = 'none'; 
            scrollContainer.style.opacity = '1'; 
        });

        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && (e.key === 'p' || e.key === 's' || e.key === 'u' || e.key === 'i')) {
                e.preventDefault();
            }
            if (e.key === 'PrintScreen') navigator.clipboard.writeText('');
        });

        setInterval(function() {
            const before = new Date().getTime();
            debugger; 
            const after = new Date().getTime();
            if (after - before > 100) {
                document.body.innerHTML = "";
            }
        }, 1000);

    </script>
</body>
</html>
